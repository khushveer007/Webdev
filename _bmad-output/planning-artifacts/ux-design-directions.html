<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UX Design Directions - Webdev Cosmic Archive</title>
  <style>
    :root {
      --bg: #060a13;
      --surface: #121b34;
      --surface-alt: #1a2747;
      --text: #e8f0ff;
      --muted: #9cb0d1;
      --primary: #62d0ff;
      --secondary: #7cffb3;
      --warn: #ffd166;
      --border: rgba(255, 255, 255, 0.14);
      --shadow: rgba(0, 0, 0, 0.45);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 20% 0%, #152a57, #060a13 58%);
      color: var(--text);
      font-family: "IBM Plex Sans", ui-sans-serif, system-ui, -apple-system, sans-serif;
    }

    .wrap {
      max-width: 1320px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      gap: 16px;
    }

    h1, h2, h3 { margin: 0; font-family: "Space Grotesk", "IBM Plex Sans", sans-serif; }
    p { margin: 0; color: var(--muted); }

    .top {
      background: linear-gradient(160deg, rgba(255,255,255,0.06), rgba(255,255,255,0.01));
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      display: grid;
      gap: 8px;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .chip {
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.05);
      padding: 6px 12px;
      font-size: 12px;
      color: var(--text);
      cursor: pointer;
    }

    .chip.active {
      border-color: var(--primary);
      color: #0b1530;
      background: var(--primary);
      font-weight: 700;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 14px;
    }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      display: grid;
      gap: 10px;
      transition: transform 180ms ease, border-color 180ms ease;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: rgba(98, 208, 255, 0.8);
    }

    .card.selected {
      border-color: var(--secondary);
      box-shadow: 0 10px 26px var(--shadow);
    }

    .meta {
      display: grid;
      gap: 6px;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .badge {
      font-size: 11px;
      border-radius: 999px;
      padding: 5px 9px;
      border: 1px solid rgba(255,255,255,0.18);
      color: var(--text);
    }

    .preview {
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.14);
      background: #0e1630;
      padding: 10px;
      height: 210px;
      overflow: hidden;
      position: relative;
      display: grid;
      gap: 8px;
    }

    .preview.desktop { width: 100%; }
    .preview.mobile {
      width: 190px;
      margin: 0 auto;
      height: 280px;
      border-radius: 20px;
    }

    .pv-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: #dce7ff;
    }

    .pv-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .pv-box {
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      min-height: 42px;
      padding: 6px;
      font-size: 10px;
      color: #b8c7e8;
    }

    .orbit-mini {
      position: relative;
      min-height: 95px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      background: linear-gradient(140deg, rgba(255,255,255,0.06), rgba(255,255,255,0.01));
      overflow: hidden;
    }

    .orbit-mini .r {
      position: absolute;
      border-radius: 50%;
      border: 1px dashed rgba(98,208,255,0.4);
    }

    .orbit-mini .r1 { width: 60px; height: 60px; top: 18px; left: 72px; }
    .orbit-mini .r2 { width: 105px; height: 105px; top: -3px; left: 49px; }
    .orbit-mini .s {
      position: absolute;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: radial-gradient(circle, #fff4c4, #ffd166);
      top: 40px;
      left: 96px;
      box-shadow: 0 0 16px rgba(255, 209, 102, 0.6);
    }

    .orbit-mini .n {
      position: absolute;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #62d0ff;
      box-shadow: 0 0 0 4px rgba(98,208,255,0.2);
    }

    .orbit-mini .n1 { top: 20px; left: 122px; }
    .orbit-mini .n2 { top: 49px; left: 40px; background: #7cffb3; box-shadow: 0 0 0 4px rgba(124,255,179,0.2); }
    .orbit-mini .n3 { top: 73px; left: 114px; }

    .score {
      display: grid;
      gap: 4px;
      font-size: 12px;
      color: var(--muted);
    }

    .bar {
      height: 6px;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      overflow: hidden;
    }

    .bar > span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
    }

    .compare {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      background: linear-gradient(160deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
    }

    .compare-card {
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 12px;
      padding: 12px;
      background: rgba(0,0,0,0.18);
      display: grid;
      gap: 8px;
    }

    .compare-card ul {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
      font-size: 14px;
    }

    .note {
      font-size: 13px;
      color: var(--muted);
    }

    @media (max-width: 880px) {
      .compare { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="top">
      <h1>Webdev Design Direction Showcase</h1>
      <p>
        Seven mockup directions generated from the UX specification. Select any two cards to compare strategy fit.
      </p>
      <div class="controls" role="group" aria-label="Preview mode">
        <button class="chip active" id="desktop-btn" type="button">Desktop Preview</button>
        <button class="chip" id="mobile-btn" type="button">Mobile Preview</button>
      </div>
    </section>

    <section class="grid" id="direction-grid" aria-label="Design directions"></section>

    <section class="compare" aria-label="Direction comparison">
      <article class="compare-card" id="left-compare">
        <h2>Selection A</h2>
        <p class="note">Select a direction card to populate this panel.</p>
      </article>
      <article class="compare-card" id="right-compare">
        <h2>Selection B</h2>
        <p class="note">Select a second direction card for side-by-side comparison.</p>
      </article>
    </section>
  </main>

  <script>
    const directions = [
      {
        id: "signal-command-deck",
        name: "Signal-First Command Deck",
        summary: "High-clarity dashboard emphasis with restrained cinematic accents.",
        strengths: ["Fast evaluator scan", "Strong comparison signals", "Low ambiguity"],
        risks: ["Can feel less emotionally unique"],
        fit: { recruiter: 95, manager: 90, engineer: 93, perf: 88 },
        tags: ["Fastlane", "Clarity", "Low Risk"]
      },
      {
        id: "minimal-orbit-editorial",
        name: "Minimal Orbit Editorial",
        summary: "Quiet typography-first direction with minimal motion and dense content readability.",
        strengths: ["Excellent readability", "Low cognitive load", "A11y-friendly baseline"],
        risks: ["Reduced novelty impact"],
        fit: { recruiter: 86, manager: 88, engineer: 90, perf: 92 },
        tags: ["Editorial", "Minimal", "Accessible"]
      },
      {
        id: "cinematic-proof-theater",
        name: "Cinematic Proof Theater",
        summary: "Motion-rich hero and dramatic transitions centered around demo playback moments.",
        strengths: ["High memorability", "Strong brand personality", "Engaging first impression"],
        risks: ["Higher perf budget pressure", "Potential evaluator skepticism"],
        fit: { recruiter: 82, manager: 80, engineer: 78, perf: 68 },
        tags: ["Cinematic", "Expressive", "High Motion"]
      },
      {
        id: "data-grid-atlas",
        name: "Data-Grid Technical Atlas",
        summary: "Engineer-first layout emphasizing architecture and measurable outcomes.",
        strengths: ["Technical credibility", "Strong tradeoff storytelling", "Clear structure"],
        risks: ["Less emotional brand differentiation"],
        fit: { recruiter: 79, manager: 87, engineer: 96, perf: 90 },
        tags: ["Technical", "Dense", "Evidence-Heavy"]
      },
      {
        id: "soft-gradient-explorer",
        name: "Soft-Gradient Explorer",
        summary: "Balanced gradient atmosphere with lightweight orbit interactions and soft cards.",
        strengths: ["Friendly tone", "Mobile-friendly scanning", "Moderate uniqueness"],
        risks: ["May under-signal technical depth"],
        fit: { recruiter: 88, manager: 84, engineer: 80, perf: 89 },
        tags: ["Friendly", "Balanced", "Mobile"]
      },
      {
        id: "dense-recruiter-fastlane",
        name: "Dense Recruiter Fastlane",
        summary: "Quick-evidence rail dominates the layout with very short path-to-proof.",
        strengths: ["Highest speed to signal", "Strong CTA clarity", "Excellent for time-constrained review"],
        risks: ["Can flatten narrative experience"],
        fit: { recruiter: 97, manager: 89, engineer: 84, perf: 91 },
        tags: ["Speed", "Utility", "Pragmatic"]
      },
      {
        id: "hybrid-balance",
        name: "Hybrid Balance (Selected)",
        summary: "Combines command-deck clarity with cinematic identity under strict performance controls.",
        strengths: ["Best all-audience fit", "Strong trust + memorability", "Scales with roadmap"],
        risks: ["Needs disciplined governance to avoid drift"],
        fit: { recruiter: 94, manager: 93, engineer: 92, perf: 87 },
        tags: ["Recommended", "Balanced", "Scalable"]
      }
    ];

    let previewMode = "desktop";
    const selected = [];

    const gridEl = document.getElementById("direction-grid");
    const leftEl = document.getElementById("left-compare");
    const rightEl = document.getElementById("right-compare");

    function metric(label, value) {
      return `
        <div class="score">
          <div>${label}: ${value}</div>
          <div class="bar"><span style="width:${value}%"></span></div>
        </div>
      `;
    }

    function previewMarkup() {
      return `
        <div class="pv-top">
          <span>Orbit Map</span>
          <span>Proof Loop: Active</span>
        </div>
        <div class="orbit-mini">
          <span class="r r1"></span>
          <span class="r r2"></span>
          <span class="s"></span>
          <span class="n n1"></span>
          <span class="n n2"></span>
          <span class="n n3"></span>
        </div>
        <div class="pv-row">
          <div class="pv-box">Autonomous Demo<br>10s deterministic</div>
          <div class="pv-box">CTA Priority<br>Back -> Snapshot</div>
        </div>
      `;
    }

    function createCard(direction) {
      const card = document.createElement("article");
      card.className = "card";
      card.dataset.id = direction.id;
      card.innerHTML = `
        <div class="meta">
          <h3>${direction.name}</h3>
          <p>${direction.summary}</p>
          <div class="badges">${direction.tags.map(tag => `<span class="badge">${tag}</span>`).join("")}</div>
        </div>
        <div class="preview ${previewMode}">${previewMarkup()}</div>
        ${metric("Recruiter Fit", direction.fit.recruiter)}
        ${metric("Manager Fit", direction.fit.manager)}
        ${metric("Engineer Fit", direction.fit.engineer)}
        ${metric("Performance Safety", direction.fit.perf)}
      `;

      card.addEventListener("click", () => toggleSelection(direction.id));
      if (selected.includes(direction.id)) card.classList.add("selected");
      return card;
    }

    function renderGrid() {
      gridEl.innerHTML = "";
      directions.forEach(d => gridEl.appendChild(createCard(d)));
    }

    function toggleSelection(id) {
      const idx = selected.indexOf(id);
      if (idx >= 0) {
        selected.splice(idx, 1);
      } else {
        if (selected.length === 2) selected.shift();
        selected.push(id);
      }
      renderGrid();
      renderCompare();
    }

    function compareMarkup(direction, title) {
      if (!direction) {
        return `<h2>${title}</h2><p class="note">Select a direction card to populate this panel.</p>`;
      }
      return `
        <h2>${title}: ${direction.name}</h2>
        <p>${direction.summary}</p>
        <h3 style="font-size:14px; margin-top:8px;">Strengths</h3>
        <ul>${direction.strengths.map(s => `<li>${s}</li>`).join("")}</ul>
        <h3 style="font-size:14px; margin-top:8px;">Risks</h3>
        <ul>${direction.risks.map(r => `<li>${r}</li>`).join("")}</ul>
      `;
    }

    function renderCompare() {
      const left = directions.find(d => d.id === selected[0]);
      const right = directions.find(d => d.id === selected[1]);
      leftEl.innerHTML = compareMarkup(left, "Selection A");
      rightEl.innerHTML = compareMarkup(right, "Selection B");
    }

    const desktopBtn = document.getElementById("desktop-btn");
    const mobileBtn = document.getElementById("mobile-btn");

    desktopBtn.addEventListener("click", () => {
      previewMode = "desktop";
      desktopBtn.classList.add("active");
      mobileBtn.classList.remove("active");
      renderGrid();
    });

    mobileBtn.addEventListener("click", () => {
      previewMode = "mobile";
      mobileBtn.classList.add("active");
      desktopBtn.classList.remove("active");
      renderGrid();
    });

    renderGrid();
    renderCompare();
    toggleSelection("hybrid-balance");
    toggleSelection("signal-command-deck");
  </script>
</body>
</html>
